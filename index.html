<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Pinned Image · Scroll to Reveal</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Quicksand:wght@300;400;500;600;700&display=swap"
			rel="stylesheet"
		/>

		<style>
			:root {
				--col1: #f9d2e5;
				--col2: #cdd1ff;
				--col3: #ffe4d3;
				--col4: #ffb399;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				background: #fff;
				font-family: 'Poppins', sans-serif;
			}

			.spacer {
				width: 100%;
				height: 50vh;
				background: #efefef;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.spacer > div {
				font-weight: 900;
				font-size: 64px;
				color: #cfcfcf;
			}

			.gallery {
				display: flex;
				background: #f8e6ef;
			}

			.left {
				width: 50%;
			}

			.detailsWrapper {
				margin: auto;
				width: 80%;
			}

			.details {
				height: 100vh;
				display: flex;
				flex-direction: column;
				justify-content: center;
			}

			.headline {
				border-radius: 6px;
				padding: 0.4em 0.8em;
				font-size: 2rem;
				font-weight: 800;
				width: fit-content;
			}

			.text {
				margin: 0.8em 0 0 0;
				max-width: 40ch;
				font-family: 'Quicksand', sans-serif;
				line-height: 1.6;
			}

			.right {
				width: 50%;
				height: 100vh;
				display: flex;
				flex-direction: column;
				justify-content: center;
			}

			.photos {
				width: 40vw;
				height: 40vw;
				margin: 0 auto;
				position: relative;
			}

			.photos-box {
				overflow: hidden;
				position: absolute;
				width: 80%;
				height: 80%;
				top: 10%;
				left: 10%;
				border-radius: 20px;
			}

			.photo {
				position: absolute;
				inset: 0;
			}

			.photo img {
				display: block;
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

			.col1 {
				background: var(--col1);
			}
			.col2 {
				background: var(--col2);
			}
			.col3 {
				background: var(--col3);
			}
			.col4 {
				background: var(--col4);
			}

			@media all and (max-width: 640px) {
				.gallery {
					position: relative;
				}

				.left {
					width: 100%;
				}

				.right {
					width: 100%;
					position: absolute;
					height: 100%;
				}

				.photos {
					position: absolute;
					width: 100%;
					height: 50vh;
					bottom: 0;
				}

				.photos-box {
					width: 90%;
					height: 90%;
					top: 0;
					left: 5%;
				}

				.details {
					justify-content: start;
					margin-top: 90px;
				}
			}
		</style>

		<script src="vendor/gsap.min.js"></script>
		<script src="vendor/ScrollTrigger.min.js"></script>
	</head>
	<body>
		<div class="spacer">
			<div>Scroll</div>
		</div>

		<div class="gallery">
			<div class="left">
				<div class="detailsWrapper">
					<div class="details d1">
						<div class="headline col1">Frame one</div>
						<p class="text">The image pins to the centre of the screen.</p>
					</div>

					<div class="details d2">
						<div class="headline col2">Frame two</div>
						<p class="text">Each frame clips into view as you scroll.</p>
					</div>

					<div class="details d3">
						<div class="headline col3">Frame three</div>
						<p class="text">Scrub keeps the animation glued to the scrollbar.</p>
					</div>

					<div class="details d4">
						<div class="headline col4">Frame four</div>
						<p class="text">The background tints toward each frame's colour.</p>
					</div>
				</div>
			</div>

			<div class="right">
				<div class="photos">
					<div class="photos-box">
						<div class="photo col1"><img src="assets/frame-01.png" /></div>
						<div class="photo col2"><img src="assets/frame-02.png" /></div>
						<div class="photo col3"><img src="assets/frame-03.png" /></div>
						<div class="photo col4"><img src="assets/frame-04.png" /></div>
					</div>
				</div>
			</div>
		</div>

		<div class="spacer">
			<div>End</div>
		</div>

		<script>
			window.onload = () => {
				gsap.registerPlugin(ScrollTrigger);

				gsap.set('.photo:not(:first-child)', {
					clipPath: 'inset(100% 0% 0%)',
				});

				const reveal = gsap.to('.photo:not(:first-child)', {
					clipPath: 'inset(0% 0% 0%)',
					duration: 1,
					stagger: 1,
					ease: 'none',
				});

				gsap.to('.photo img', {
					y: -6,
					duration: 2,
					repeat: -1,
					yoyo: true,
					ease: 'power1.inOut',
				});

				ScrollTrigger.create({
					trigger: '.gallery',
					start: 'top top',
					end: 'bottom bottom',
					pin: '.right',
					animation: reveal,
					scrub: 1.2,
				});

				const tints = [
					['.d1', '#f9d2e5aa'],
					['.d2', '#cdd1ffaa'],
					['.d3', '#ffe4d3ee'],
					['.d4', '#ffb399aa'],
				];
				tints.forEach(([trigger, backgroundColor]) => {
					gsap.to('.gallery', {
						backgroundColor,
						duration: 1,
						scrollTrigger: { trigger, scrub: true },
					});
				});
			};
		</script>
	</body>
</html>
